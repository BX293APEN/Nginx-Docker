# --- Nginx 設定ファイル ---
# 起動方法: nginx -p <このconfigの1つ上のnginxディレクトリの絶対パス> -c config/nginx.conf
# (start.sh がコンテナ起動時に上記コマンドで起動する)
#
# -p で指定したディレクトリ(prefix)からの相対パスとして
# root / pid / access_log / error_log / client_body_temp_path を解釈させることで
# ユーザー名や作業ディレクトリ名(.envのUSER_NAME, WS)が変わっても
# このファイル自体は書き換え不要になるようにしている。

# ワーカープロセス数(auto = CPUコア数から自動決定)
worker_processes auto;

# PIDファイルの出力先(prefixからの相対パス)
pid run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 拡張子からContent-Typeを判別するための定義(システム標準のものを利用)
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log run/access.log;
    error_log  run/error.log;

    # 各種一時ファイル置き場(prefixからの相対パス。事前にstart.shで作成しておく)
    # 指定しない場合は既定で /var/lib/nginx/... が使われ、非rootユーザーでは
    # mkdir()で Permission denied になるため、全て明示的に上書きする
    client_body_temp_path run/tmp/client_body;
    proxy_temp_path       run/tmp/proxy;
    fastcgi_temp_path     run/tmp/fastcgi;
    uwsgi_temp_path       run/tmp/uwsgi;
    scgi_temp_path        run/tmp/scgi;

    server {
        listen      3000;
        server_name _;

        root  html;
        index index.html;

        # index.html等の静的ファイルはそのまま配信する
        location / {
            try_files $uri $uri/ =404;
        }

        # /cgi-bin/ 配下は libcgipy(CGIHTTPサーバー, 127.0.0.1:8000)へ中継する
        # ※ libcgipy側は http.server 由来のCGI実行サーバーであり、
        #    Nginx単体ではCGIを直接実行できないためリバースプロキシで連携する
        location /cgi-bin/ {
            proxy_pass       http://127.0.0.1:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
