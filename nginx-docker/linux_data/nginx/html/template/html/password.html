<div class="container pt-3">
    <main>
        <h1 class="mt-3 border-bottom">MySQLCGI</h1>

        <div class="alert alert-warning mt-3" role="alert">
            ユーザ <strong>{user}</strong> で接続するにはパスワードが必要です。{error}
        </div>

        <!--
            注意 : このフォームは method="GET" で送信するため、
            送信後のURLに入力したパスワードがそのまま平文で残ります。
            (要件により、状態保存のためクエリ文字列にパスワードを載せる方式を採用)
        -->
        <form method="GET" action="/cgi-bin/main.py" class="border-bottom pb-4">
            <input type="hidden" name="user" value="{user}">
            <input type="hidden" name="database" value="{database}">
            <input type="hidden" name="sql" value="{sql}">
            <div class="mb-3">
                <label class="form-label" for="password">パスワード</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    autofocus
                >
            </div>
            <button type="submit" class="btn btn-primary mb-4">接続</button>
        </form>
    </main>
</div>
