# --- Nginx 設定ファイル ---
# 起動方法: nginx -p <このconfigの1つ上のnginxディレクトリの絶対パス> -c config/nginx.conf
# (start.sh がコンテナ起動時に上記コマンドで起動する)
#
# -p で指定したディレクトリ(prefix)からの相対パスとして
# root / pid / access_log / error_log / client_body_temp_path を解釈させることで
# ユーザー名や作業ディレクトリ名(.envのUSER_NAME, WS)が変わっても
# このファイル自体は書き換え不要になるようにしている。

# ワーカープロセス数(auto = CPUコア数から自動決定)
worker_processes auto;

# PIDファイルの出力先(prefixからの相対パス)
pid run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 拡張子からContent-Typeを判別するための定義(システム標準のものを利用)
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log run/access.log;
    error_log  run/error.log;

    # 各種一時ファイル置き場(prefixからの相対パス。事前にstart.shで作成しておく)
    # 指定しない場合は既定で /var/lib/nginx/... が使われ、非rootユーザーでは
    # mkdir()で Permission denied になるため、全て明示的に上書きする
    client_body_temp_path run/tmp/client_body;
    proxy_temp_path       run/tmp/proxy;
    fastcgi_temp_path     run/tmp/fastcgi;
    uwsgi_temp_path       run/tmp/uwsgi;
    scgi_temp_path        run/tmp/scgi;

    server {
        listen      3000;
        server_name _;

        root  html;
        index index.html;

        # index.html等の静的ファイルはそのまま配信する
        location / {
            try_files $uri $uri/ =404;
        }

        # --- /cgi-bin/ 直下の.pyファイルは fcgiwrap(127.0.0.1:9001)へFastCGIで中継する ---
        # ※ Nginx単体ではCGIを直接実行できないため、CGI実行部分はfcgiwrapに担わせる。
        #    fcgiwrapはリクエストごとにスクリプトをfork/execし、標準入出力と
        #    環境変数(REQUEST_METHOD, CONTENT_LENGTH等)経由でCGIプロトコルそのものを話す。
        #    (start.shがspawn-fcgi経由でfcgiwrapを起動している)
        #
        # `^/cgi-bin/[^/]+\.py$` に限定することで、view/配下のライブラリ(MySQAPI.py等)が
        # 直接リクエストされて実行されてしまうのを防いでいる。
        location ~ ^/cgi-bin/[^/]+\.py$ {
            # 存在しないスクリプトへのリクエストは404を返す(fcgiwrapへ渡さない)
            if (!-f $document_root$uri) {
                return 404;
            }

            include       /etc/nginx/fastcgi_params;
            fastcgi_pass  127.0.0.1:9001;

            # 実行対象のスクリプトファイル(絶対パス)
            fastcgi_param SCRIPT_FILENAME $document_root$uri;
            # fastcgi_params には含まれないため明示的に設定する
            fastcgi_param PATH_INFO       "";
        }

        # --- /cgi-bin/ 配下で上記(直下の.py)にマッチしなかったものは全て拒否 ---
        # これが無いと、location / の try_files により view/*.py 等の
        # ソースコードがそのまま静的ファイルとして閲覧できてしまう。
        # (location ~ は書かれた順に評価されるため、このlocationは上記の後に置くこと)
        location ~ ^/cgi-bin/ {
            deny all;
        }
    }
}
