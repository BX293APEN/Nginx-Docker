# This file path : /${ENTRY_DIR}/${WS}/nginx/config/nginx.conf

# nginx -p "/${ENTRY_DIR}/${WS}/nginx" -c "/${ENTRY_DIR}/${WS}/nginx/config/nginx.conf"

worker_processes auto;
pid run/nginx.pid;
error_log  run/error.log;

events {
    worker_connections 1024;
}

http {
    access_log run/access.log;
    client_body_temp_path run/tmp/client_body;
    proxy_temp_path       run/tmp/proxy;
    fastcgi_temp_path     run/tmp/fastcgi;
    uwsgi_temp_path       run/tmp/uwsgi;
    scgi_temp_path        run/tmp/scgi;

    # 拡張子からContent-Typeを判別するための定義(システム標準のものを利用)
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen      3000;
        server_name _;

        root  html;
        index index.html;

        # index.html等の静的ファイルはそのまま配信する
        location / {
            try_files $uri $uri/ =404;
        }

        # /cgi-bin/ 直下の.pyファイルの挙動を設定
        location ~ ^/cgi-bin/[^/]+\.py$ {

            # 存在しないスクリプトへのリクエストは404を返す(fcgiwrapへ渡さない)
            if (!-f $document_root$uri) {
                return 404;
            }

            # fcgiwrap(127.0.0.1:9001)へFastCGIで中継する
            include       /etc/nginx/fastcgi_params;
            fastcgi_pass  127.0.0.1:9001;

            # 実行対象のスクリプトファイル(絶対パス)
            fastcgi_param SCRIPT_FILENAME $document_root$uri;
            # fastcgi_params には含まれないため明示的に設定する
            fastcgi_param PATH_INFO       "";
            # 標準のfastcgi_paramsにはCookieヘッダーが含まれないため、
            # セッションID受け渡し(HTTP_COOKIE)のために明示的に渡す
            fastcgi_param HTTP_COOKIE     $http_cookie;
        }

        # location ~ は書かれた順に評価される
        location ~ ^/cgi-bin/ {
            # ^/cgi-bin/[^/]+\.py$でマッチしなかったものは全て拒否
            deny all;
        }
    }
}
