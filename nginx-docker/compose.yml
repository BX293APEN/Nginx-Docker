# YAMLはスペース2つ
# name: project1                            # プロジェクト名(全て小文字)
services:                                   # 作成したいコンテナを列挙
  linux:                                    # 作成するコンテナの名前(docker composeで管理する名前)
    env_file: .env
    
    container_name: ${CONTAINER_NAME}       # 外部から見た時の名前
    
    # IPアドレスの確認 
    # docker inspect --format="{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}" [${CONTAINER_NAME}の値]

    hostname: ${CONTAINER_NAME}             # ホスト名

    build: 
      context: ${Dockerfile_DIR}
      dockerfile: ${Dockerfile}             # Dockerfileへの相対パス
      args:                                 # Dockerfile内の環境変数を設定
        WS:           ${WS}
        USER_NAME:    ${USER_NAME}
        PASSWORD:     ${PASSWORD}
        ENTRY_DIR:    ${ENTRY_DIR}
        ENTRY_POINT:  ${ENTRY_POINT}
        LANG:         ${LANG}
    
    # image: ubuntu:25.10                   # Dockerfileが無い場合

    volumes:                                # マウント
      - ${VOLUME}:/${ENTRY_DIR}/${WS}       # ホストディレクトリ: コンテナ内ディレクトリ(ホームディレクトリ配下ではなく/${ENTRY_DIR}直下に置く)

    restart: unless-stopped                 # no unless-stopped always ...

    environment:                            # コンテナ内の環境変数を設定
      - TZ=${TIME_ZONE}
      - LANG=${LANG}
      - DB_HOST=${DB_HOST}                  # MySQAPI.py が接続先を判断するための環境変数
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    
    ports:                                  # ポートを接続
      - "3000:3000"                         # ホストマシンのポート番号:コンテナのポート番号
    
    depends_on:                            # コンテナ間の依存関係を定義
      db:
        condition: service_healthy         # dbコンテナのヘルスチェックが通ってから起動する

    command:                                # サービスコンテナが起動したときに実行するコマンド
      - /${ENTRY_DIR}/${ENTRY_POINT}
    

  db:                                        # MySQLサーバー用コンテナ
    image: ${DB_IMAGE}

    container_name: ${DB_CONTAINER_NAME}      # 外部から見た時の名前(linuxコンテナからはこの名前で名前解決できる)
    hostname: ${DB_CONTAINER_NAME}

    environment:                              # MySQL公式イメージが参照する環境変数
      - TZ=${TIME_ZONE}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}

    volumes:                                  # マウント(データを永続化)
      - ${VOLUME}/db:/var/lib/mysql

    restart: unless-stopped                   # no unless-stopped always ...

    # ports:                                  # ホストから直接操作したい場合のみ有効化
    #   - "3305:3306"

    healthcheck:                              # linuxコンテナより先に接続可能になるまで待つ
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10